<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rowing at Home — 3D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body { background: #87CEEB; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    canvas { display: block; position: relative; z-index: 0; }

    #hud {
      position: fixed; top: 0; left: 0; right: 0; z-index: 10;
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 16px 20px; pointer-events: none;
    }
    #hud-left, #hud-right {
      background: rgba(10, 20, 40, 0.65); backdrop-filter: blur(8px);
      border-radius: 12px; padding: 14px 18px; color: #eee;
      font-size: 14px; line-height: 1.6;
      pointer-events: auto;
    }
    #hud-left { min-width: 200px; }
    #hud-right { text-align: right; font-family: "SF Mono", Monaco, Consolas, monospace; font-size: 12px; max-width: 320px; max-height: 280px; overflow: hidden; }
    .stat-row { display: flex; justify-content: space-between; gap: 16px; }
    .stat-label { color: #8ab; }
    .stat-value { font-weight: bold; }
    .stat-big { font-size: 20px; color: #4ecca3; }
    .disconnected { color: #e94560; }
    .connected { color: #4ecca3; }

    #controls {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
      display: flex; justify-content: center; gap: 12px;
      padding: 16px 20px; pointer-events: none;
    }
    #connect-btn, #camera-btn, #stroke-btn, #stop-btn {
      pointer-events: auto;
      padding: 12px 28px; font-size: 15px;
      border: none; border-radius: 8px; cursor: pointer;
      background: #0f3460; color: #fff; transition: background .2s;
    }
    #connect-btn:hover, #camera-btn:hover, #stroke-btn:hover, #stop-btn:hover { background: #1a4a8a; }
    #connect-btn:disabled, #camera-btn:disabled, #stroke-btn:disabled, #stop-btn:disabled { opacity: .5; cursor: default; }
    #camera-btn, #stroke-btn, #stop-btn { background: #2a2a4e; }
    #camera-btn:hover, #stroke-btn:hover, #stop-btn:hover { background: #3a3a6e; }

    #pause-overlay {
      position: fixed; inset: 0; z-index: 50;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(5, 10, 25, 0.8); backdrop-filter: blur(6px);
    }
    #pause-overlay.visible { display: flex; }
    #pause-menu {
      background: rgba(15, 25, 50, 0.95);
      border: 1px solid #2a3a5e;
      border-radius: 16px; padding: 40px 48px;
      text-align: center; min-width: 320px;
    }
    #pause-menu h2 { color: #e9c46a; font-size: 28px; margin-bottom: 24px; }
    #pause-menu .summary { color: #8ab; font-size: 14px; margin-bottom: 24px; line-height: 1.8; }
    #pause-menu .summary span { color: #4ecca3; font-weight: bold; }
    .pause-btn {
      display: block; width: 100%; margin: 8px 0;
      padding: 14px 24px; font-size: 16px;
      border: none; border-radius: 10px; cursor: pointer;
      color: #fff; transition: background .2s;
    }
    .pause-btn:hover { opacity: 0.85; }
    #btn-resume { background: #0f3460; }
    #btn-save   { background: #2a5a2a; }
    #btn-list   { background: #4a3a6e; }
    #btn-reset  { background: #5a1a2e; }

    /* --- Diálogo de nombre para guardar --- */
    #save-name-overlay {
      position: fixed; inset: 0; z-index: 60;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(5, 10, 25, 0.85); backdrop-filter: blur(6px);
    }
    #save-name-overlay.visible { display: flex; }
    #save-name-box {
      background: rgba(15, 25, 50, 0.95);
      border: 1px solid #2a3a5e;
      border-radius: 16px; padding: 36px 40px;
      text-align: center; min-width: 340px;
    }
    #save-name-box h3 { color: #e9c46a; font-size: 20px; margin-bottom: 20px; }
    #save-name-input {
      width: 100%; padding: 12px 16px; font-size: 16px;
      border: 1px solid #3a4a6e; border-radius: 8px;
      background: #0a1530; color: #eee; margin-bottom: 16px;
      box-sizing: border-box;
    }
    #save-name-input:focus { outline: none; border-color: #4ecca3; }
    #save-name-box .pause-btn { margin: 6px 0; }
    #btn-save-confirm { background: #2a5a2a; }
    #btn-save-cancel { background: #5a1a2e; }

    /* --- Lista de entrenamientos guardados --- */
    #saves-list-overlay {
      position: fixed; inset: 0; z-index: 60;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(5, 10, 25, 0.85); backdrop-filter: blur(6px);
    }
    #saves-list-overlay.visible { display: flex; }
    #saves-list-box {
      background: rgba(15, 25, 50, 0.95);
      border: 1px solid #2a3a5e;
      border-radius: 16px; padding: 36px 40px;
      min-width: 460px; max-width: 600px; max-height: 80vh;
      overflow-y: auto;
    }
    #saves-list-box h3 { color: #e9c46a; font-size: 20px; margin-bottom: 20px; text-align: center; }
    .save-entry {
      background: rgba(20, 35, 65, 0.8);
      border: 1px solid #2a3a5e;
      border-radius: 10px; padding: 14px 18px;
      margin-bottom: 10px; display: flex;
      align-items: center; gap: 12px;
    }
    .save-info { flex: 1; min-width: 0; }
    .save-name { color: #4ecca3; font-weight: bold; font-size: 15px; }
    .save-date { color: #8ab; font-size: 12px; }
    .save-stats { color: #ccc; font-size: 12px; margin-top: 4px; }
    .save-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .save-actions button {
      padding: 8px 12px; font-size: 13px;
      border: none; border-radius: 6px; cursor: pointer;
      color: #fff; transition: opacity .2s;
    }
    .save-actions button:hover { opacity: 0.8; }
    .btn-load-save { background: #0f3460; }
    .btn-export-save { background: #2a5a2a; }
    .btn-delete-save { background: #5a1a2e; }
    #saves-empty { color: #8ab; text-align: center; padding: 30px; font-size: 14px; }

    #log {
      font-family: "SF Mono", Monaco, Consolas, monospace; font-size: 11px;
      color: #8ab; white-space: pre-wrap; word-break: break-all; max-height: 200px; overflow-y: auto;
    }
    #log .hex { color: #4ecca3; }
    #log .cmd { color: #6ab0f3; }
    #log .svc { color: #e94560; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
    }
  }
  </script>
</head>
<body>

<div id="hud">
  <div id="hud-left">
    <div class="stat-row"><span class="stat-label">Velocidad</span><span class="stat-value stat-big" id="s-speed">0.0</span></div>
    <div class="stat-row"><span class="stat-label">km/h</span><span class="stat-value stat-label" id="s-speed-unit">&nbsp;</span></div>
    <div class="stat-row"><span class="stat-label">Cadencia</span><span class="stat-value" id="s-cadence">0 spm</span></div>
    <div class="stat-row"><span class="stat-label">Remadas</span><span class="stat-value" id="s-strokes">0</span></div>
    <div class="stat-row"><span class="stat-label">Distancia</span><span class="stat-value" id="s-distance">0 m</span></div>
    <div class="stat-row"><span class="stat-label">Tiempo</span><span class="stat-value" id="s-time">00:00:00</span></div>
    <div class="stat-row"><span class="stat-label">Resistencia</span><span class="stat-value" id="s-resistance">—</span></div>
    <div class="stat-row"><span class="stat-label">Calorías</span><span class="stat-value" id="s-calories">0 kcal</span></div>

    <div class="stat-row"><span class="stat-label">Inclinación</span><span class="stat-value" id="s-incl">—</span></div>
    <div class="stat-row"><span class="stat-label">Estado</span><span class="stat-value disconnected" id="s-status">Desconectado</span></div>

    <div id="log"></div>

</div>

<div id="controls">
  <button id="connect-btn">Conectar a la máquina</button>
  <button id="camera-btn">Cámara</button>
  <button id="stroke-btn">+1 Remada</button>
  <button id="stop-btn">⏸ Pausa</button>
</div>

<div id="pause-overlay">
  <div id="pause-menu">
    <h2>Pausa</h2>
    <div class="summary" id="pause-summary"></div>
    <button class="pause-btn" id="btn-resume">▶ Reanudar</button>
    <button class="pause-btn" id="btn-save">💾 Guardar progreso</button>
    <button class="pause-btn" id="btn-list">📋 Mis entrenamientos</button>

  </div>
</div>

<div id="save-name-overlay">
  <div id="save-name-box">
    <h3>Nombre del entrenamiento</h3>
    <input type="text" id="save-name-input" placeholder="Ej: Sesión matinal 5km" maxlength="60">
    <button class="pause-btn" id="btn-save-confirm">✓ Guardar</button>
    <button class="pause-btn" id="btn-save-cancel">✕ Cancelar</button>
  </div>
</div>

<div id="saves-list-overlay">
  <div id="saves-list-box">
    <h3>Entrenamientos guardados</h3>
    <div id="saves-list"></div>
    <button class="pause-btn" id="btn-saves-close" style="margin-top:16px; background:#5a1a2e;">✕ Cerrar</button>
  </div>

<script type="module">
import * as THREE from 'three';

// ========================================================================
//  THREE.JS — ESCENA LOW-POLY
// ========================================================================

let scene, camera, renderer, clock;
let boat, rower, oarLeft, oarRight;
const riverSegments = [];
let cameraMode = 0; // 0: chase, 1: side, 2: cinematic
const CAM_MODES = ['Trasera', 'Lateral', 'Cinemática'];
const bots = [];
let paused = false;

// ========================================================================
//  SISTEMA DE GUARDADO — N entrenamientos con nombre y fecha
// ========================================================================
const SAVE_PREFIX = 'rowingAtHome_save_';

function getAllSaves() {
  const saves = [];
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key && key.startsWith(SAVE_PREFIX)) {
      try {
        saves.push(JSON.parse(localStorage.getItem(key)));
      } catch (e) { /* skip corrupt */ }
    }
  }
  saves.sort((a, b) => (b.savedAt || 0) - (a.savedAt || 0));
  return saves;
}

function saveProgress(name) {
  const dist = Math.max(gameState.distance, gameState.gameDistance);
  const data = {
    id: 'save_' + Date.now(),
    name: name || ('Entrenamiento ' + new Date().toLocaleDateString('es-ES')),
    strokes: gameState.strokes,
    distance: Math.round(dist),
    gameDistance: gameState.gameDistance,
    calories: gameState.calories,
    avgCadence: gameState.avgCadence || 0,
    avgHeartRate: gameState.avgHeartRate || 0,
    maxHeartRate: gameState.maxHeartRate || 0,
    resistance: gameState.resistance || 0,
    durationSec: gameState.exerciseTime || 0,
    boatZ: gameState.boatZ,
    savedAt: Date.now(),
  };
  localStorage.setItem(SAVE_PREFIX + data.id, JSON.stringify(data));
  return data;
}

function loadProgress(id) {
  const raw = localStorage.getItem(SAVE_PREFIX + id);
  if (!raw) return false;
  try {
    const data = JSON.parse(raw);
    gameState.strokes = data.strokes || 0;
    gameState.distance = data.distance || 0;
    gameState.gameDistance = data.gameDistance || 0;
    gameState.calories = data.calories || 0;
    gameState.exerciseTime = data.durationSec || 0;
    gameState.boatZ = data.boatZ || 0;
    gameState.boatVelocity = 0;
    if (boat) {
      boat.position.z = gameState.boatZ;
      boat.position.x = riverCurveX(gameState.boatZ);
      boat.rotation.y = riverHeading(gameState.boatZ);
    }
    $sStrokes.textContent = gameState.strokes;
    $sDist.textContent = gameState.distance + ' m';
    $sCal.textContent = gameState.calories + ' kcal';
    $sSpeed.textContent = '0.0';
    $sTime.textContent = formatDuration(gameState.exerciseTime);
    return true;
  } catch (e) {
    return false;
  }
}

function deleteProgress(id) {
  localStorage.removeItem(SAVE_PREFIX + id);
}

function hasSavedProgress() {
  for (let i = 0; i < localStorage.length; i++) {
    if (localStorage.key(i).startsWith(SAVE_PREFIX)) return true;
  }
  return false;
}

// --- Exportación a fichero TCX compatible con Strava ---
function estimateDuration(data) {
  if (data.durationSec && data.durationSec > 10) return data.durationSec;
  if (data.strokes > 0 && data.avgCadence > 0) {
    return Math.round(data.strokes / data.avgCadence * 60);
  }
  if (data.distance > 0) {
    // Estimar a 15 km/h promedio (ritmo de remo moderado)
    return Math.round(data.distance / (15 / 3.6));
  }
  return 600;
}

function formatTCXDate(ts) {
  return new Date(ts).toISOString().replace(/\.\d+Z$/, 'Z');
}

function formatDuration(sec) {
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = Math.floor(sec % 60);
  return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
}

function exportToTCX(data) {
  const duration = estimateDuration(data);
  const distance = data.distance || 0;
  const calories = data.calories || 0;
  const avgHR = data.avgHeartRate || 0;
  const maxHR = data.maxHeartRate || avgHR || 0;
  const startTime = data.savedAt || Date.now();
  const startStr = formatTCXDate(startTime);

  // TCX sin trackpoints (sin GPS). Strava lo acepta como ejercicio manual.
  // Usamos Activity > Lap con datos agregados.
  let tcx = `<?xml version="1.0" encoding="UTF-8"?>\n`;
  tcx += `<TrainingCenterDatabase xmlns="http://www.garmin.com/xmlschemas/TrainingCenterDatabase/v2">\n`;
  tcx += `  <Activities>\n`;
  tcx += `    <Activity Sport="Rowing">\n`;
  tcx += `      <Id>${startStr}</Id>\n`;
  tcx += `      <Lap StartTime="${startStr}">\n`;
  tcx += `        <TotalTimeSeconds>${duration}</TotalTimeSeconds>\n`;
  tcx += `        <DistanceMeters>${distance}</DistanceMeters>\n`;
  tcx += `        <MaximumSpeed>0</MaximumSpeed>\n`;
  tcx += `        <Calories>${calories}</Calories>\n`;
  if (avgHR > 0) {
    tcx += `        <AverageHeartRateBpm><Value>${Math.round(avgHR)}</Value></AverageHeartRateBpm>\n`;
  }
  if (maxHR > 0) {
    tcx += `        <MaximumHeartRateBpm><Value>${Math.round(maxHR)}</Value></MaximumHeartRateBpm>\n`;
  }
  tcx += `        <Intensity>Active</Intensity>\n`;
  tcx += `        <TriggerMethod>Manual</TriggerMethod>\n`;

  // Generar trackpoints sintéticos para que Strava acepte el fichero
  // (Strava requiere al menos algunos trackpoints para procesar la actividad)
  const numPoints = Math.min(Math.max(Math.floor(duration / 10), 10), 500);
  const stepDuration = duration / numPoints;
  const stepDistance = distance / numPoints;
  for (let i = 0; i <= numPoints; i++) {
    const t = i * stepDuration;
    const d = i * stepDistance;
    const tcxTime = formatTCXDate(startTime + t * 1000);
    tcx += `        <Track>\n`;
    tcx += `          <Trackpoint>\n`;
    tcx += `            <Time>${tcxTime}</Time>\n`;
    tcx += `            <DistanceMeters>${d.toFixed(1)}</DistanceMeters>\n`;
    if (avgHR > 0) {
      const hr = Math.round(avgHR + (maxHR - avgHR) * Math.sin(i / numPoints * Math.PI));
      tcx += `            <HeartRateBpm><Value>${hr}</Value></HeartRateBpm>\n`;
    }
    tcx += `          </Trackpoint>\n`;
    tcx += `        </Track>\n`;
  }

  tcx += `      </Lap>\n`;
  tcx += `      <Notes>${data.name || 'Rowing session'} — Remadas: ${data.strokes || 0}</Notes>\n`;
  tcx += `    </Activity>\n`;
  tcx += `  </Activities>\n`;
  tcx += `</TrainingCenterDatabase>\n`;

  return tcx;
}

function downloadFile(filename, content, mimeType) {
  const blob = new Blob([content], { type: mimeType });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function exportSave(data) {
  const tcx = exportToTCX(data);
  const dateStr = new Date(data.savedAt).toISOString().slice(0, 10);
  const safeName = (data.name || 'rowing').replace(/[^a-zA-Z0-9_-]/g, '_');
  downloadFile(`${safeName}_${dateStr}.tcx`, tcx, 'application/vnd.garmin.tcx+xml');
}

function updatePauseSummary() {
  const dist = Math.max(gameState.distance, gameState.gameDistance);
  const el = document.getElementById('pause-summary');
  el.innerHTML = `
    Remadas: <span>${gameState.strokes}</span><br>
    Distancia: <span>${Math.round(dist)} m</span><br>
    Calorías: <span>${gameState.calories} kcal</span><br>
    Tiempo: <span>${formatDuration(gameState.exerciseTime || 0)}</span>
  `;
}

function renderSavesList() {
  const saves = getAllSaves();
  const container = document.getElementById('saves-list');
  if (saves.length === 0) {
    container.innerHTML = '<div id="saves-empty">No hay entrenamientos guardados</div>';
    return;
  }
  container.innerHTML = '';
  for (const sv of saves) {
    const entry = document.createElement('div');
    entry.className = 'save-entry';
    const date = new Date(sv.savedAt);
    const dateStr = date.toLocaleDateString('es-ES') + ' ' + date.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
    const durStr = formatDuration(estimateDuration(sv));
    const dist = sv.distance || Math.round(sv.gameDistance || 0);
    entry.innerHTML = `
      <div class="save-info">
        <div class="save-name">${escapeHtml(sv.name)}</div>
        <div class="save-date">${dateStr}</div>
        <div class="save-stats">${dist} m · ${sv.calories || 0} kcal · ${sv.strokes || 0} remadas · ${durStr}</div>
      </div>
      <div class="save-actions">
        <button class="btn-load-save" data-id="${sv.id}">Cargar</button>
        <button class="btn-export-save" data-id="${sv.id}">Exportar</button>
        <button class="btn-delete-save" data-id="${sv.id}">Borrar</button>
      </div>
    `;
    container.appendChild(entry);
  }

  container.querySelectorAll('.btn-load-save').forEach(btn => {
    btn.addEventListener('click', () => {
      if (loadProgress(btn.dataset.id)) {
        document.getElementById('saves-list-overlay').classList.remove('visible');
        paused = false;
      }
    });
  });
  container.querySelectorAll('.btn-export-save').forEach(btn => {
    btn.addEventListener('click', () => {
      const raw = localStorage.getItem(SAVE_PREFIX + btn.dataset.id);
      if (raw) {
        try { exportSave(JSON.parse(raw)); } catch (e) {}
      }
    });
  });
  container.querySelectorAll('.btn-delete-save').forEach(btn => {
    btn.addEventListener('click', () => {
      deleteProgress(btn.dataset.id);
      renderSavesList();
    });
  });
}

function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s || '';
  return div.innerHTML;
}

// Estado del juego alimentado por BLE
const gameState = {
  speed: 0,          // km/h (mostrado en HUD, derivado de boatVelocity)
  cadence: 0,        // spm
  strokes: 0,
  distance: 0,       // metros (BLE)
  gameDistance: 0,   // metros acumulados por física del juego (para carteles sin BLE)
  resistance: 0,     // 1-15 (BLE byte 14)
  calories: 0,       // kcal (BLE bytes 10-11)
  heartRate: 0,      // bpm (BLE byte 18)
  inclination: 0,    // 0-15 (BLE byte 21)
  boatZ: 0,          // posicion virtual del barco (world units)
  strokePhase: 0,    // 0..1 fase de la remada actual
  lastStrokeTime: 0,
  // Física del barco
  boatVelocity: 0,   // velocidad en unidades de mundo/s
  lastBLEStrokes: 0, // para detectar nuevas remadas del BLE
  lastImpulseTime: 0,
  // Estadísticas de entrenamiento (para exportar)
  exerciseTime: 0,   // segundos activos remando
  cadenceSum: 0,     // suma de cadencia para media
  cadenceSamples: 0, // nº de muestras
  heartRateSum: 0,
  heartRateSamples: 0,
  maxHeartRate: 0,
};

// Getters para medias (definidos como propiedades para que saveProgress los use)
Object.defineProperties(gameState, {
  avgCadence: { get() { return this.cadenceSamples > 0 ? this.cadenceSum / this.cadenceSamples : 0; } },
  avgHeartRate: { get() { return this.heartRateSamples > 0 ? this.heartRateSum / this.heartRateSamples : 0; } },
});

// --- Modelo físico del remo ---
// Cada remada aplica un impulso (delta de velocidad instantáneo).
// El rozamiento del agua es cuadrático: F_drag = -k*v² - c*v
// Velocidad terminal (steady state): v_t = sqrt(impulse * cadence / (60 * k))
const PHYS = {
  STROKE_IMPULSE: 0.35,   // delta de velocidad por remada (u/s)
  DRAG_QUAD: 0.02,         // coef. rozamiento cuadrático (agua)
  DRAG_LIN: 0.15,           // coef. rozamiento lineal (fricción residual)
  MIN_VELOCITY: 0.01,       // debajo de esto, parar
  MAX_VELOCITY: 3.5,        // tope (u/s) ≈ 17.5 km/h en HUD
  KM_H_FACTOR: 5.0,        // conversión u/s → km/h para display
  BLE_CADENCE_TIMEOUT: 4.0, // sin paquetes BLE tras N segundos, asumir parada
};
let lastBLEPacketTime = 0;

function applyStrokeImpulse() {
  // El impulso escala con la resistencia: a mayor resistencia, más fuerza
  // aplica el remero por stroke (más trabajo por remada).
  // resistance 1-15 → factor 0.5..1.6
  const r = gameState.resistance || 1;
  const resistFactor = 0.4 + (r / 15) * 1.2;
  gameState.boatVelocity += PHYS.STROKE_IMPULSE * resistFactor;
  if (gameState.boatVelocity > PHYS.MAX_VELOCITY) {
    gameState.boatVelocity = PHYS.MAX_VELOCITY;
  }
  gameState.lastImpulseTime = clock ? clock.elapsedTime : 0;
}

function updateBoatPhysics(dt) {
  const v = gameState.boatVelocity;
  // El drag también escala con la resistencia: más resistencia = más oposición
  const r = gameState.resistance || 1;
  const dragResist = 0.7 + (r / 15) * 0.6;
  // Rozamiento del agua: F = -(k*v² + c*v) en sentido opuesto al movimiento
  const drag = (PHYS.DRAG_QUAD * v * v + PHYS.DRAG_LIN * v) * dragResist;
  gameState.boatVelocity -= drag * dt;

  if (gameState.boatVelocity < PHYS.MIN_VELOCITY) {
    gameState.boatVelocity = 0;
  }

  // Si la cadencia viene del BLE, aplicar impulsos periódicamente basados en cadencia
  // (el BLE también detecta nuevas remadas vía stroke count, pero como los paquetes
  //  no llegan exactamente al ritmo de cada remada, usamos un modelo de cadencia suave)
  if (gameState.cadence > 0 && lastBLEPacketTime > 0) {
    const timeSinceBLE = clock.elapsedTime - lastBLEPacketTime;
    if (timeSinceBLE < PHYS.BLE_CADENCE_TIMEOUT) {
      // Aplicar impulsos al ritmo de la cadencia
      const strokeInterval = 60 / gameState.cadence;
      const timeSinceImpulse = clock.elapsedTime - gameState.lastImpulseTime;
      if (timeSinceImpulse >= strokeInterval) {
        applyStrokeImpulse();
      }
    }
  }

  // Actualizar velocidad mostrada
  gameState.speed = gameState.boatVelocity * PHYS.KM_H_FACTOR;

  // Mover barco
  const deltaZ = gameState.boatVelocity * dt;
  gameState.boatZ -= deltaZ;

  // Acumular distancia del juego (para carteles cuando no hay BLE)
  gameState.gameDistance += deltaZ * METERS_PER_UNIT;

  // Acumular estadísticas de entrenamiento
  if (gameState.cadence > 0 || gameState.boatVelocity > 0) {
    gameState.exerciseTime += dt;
    if (gameState.cadence > 0) {
      gameState.cadenceSum += gameState.cadence;
      gameState.cadenceSamples++;
    }
  }
  $sTime.textContent = formatDuration(gameState.exerciseTime);
  if (gameState.heartRate > 0) {
    gameState.heartRateSum += gameState.heartRate;
    gameState.heartRateSamples++;
    if (gameState.heartRate > gameState.maxHeartRate) {
      gameState.maxHeartRate = gameState.heartRate;
    }
  }

  if (boat) {
    boat.position.z = gameState.boatZ;
    boat.position.x = riverCurveX(gameState.boatZ);
    boat.rotation.y = riverHeading(gameState.boatZ);
  }

  // Actualizar HUD de velocidad
  $sSpeed.textContent = gameState.speed.toFixed(1);
}

// --- Río ---
const RIVER_WIDTH = 14;
const SEGMENT_LENGTH = 20;
const NUM_SEGMENTS = 30;
// --- Curva del río ---
// El centro del río se desvía en X según una suma de senos (curva suave)
const CURVE_AMPLITUDE = 14;  // desviación máxima en X (uds)
const CURVE_FREQ = 0.008;    // frecuencia de la curva principal
const CURVE_FREQ2 = 0.017;   // frecuencia secundaria (variación)

// Devuelve la X del centro del río en la posición Z dada
function riverCurveX(z) {
  return Math.sin(z * CURVE_FREQ) * CURVE_AMPLITUDE
       + Math.sin(z * CURVE_FREQ2 + 1.3) * CURVE_AMPLITUDE * 0.35;
}

// Devuelve el ángulo de rumbo (heading) en radianes en la posición Z dada
// Es la derivada de riverCurveX: dX/dZ
function riverHeading(z) {
  return Math.atan(
    Math.cos(z * CURVE_FREQ) * CURVE_AMPLITUDE * CURVE_FREQ
    + Math.cos(z * CURVE_FREQ2 + 1.3) * CURVE_AMPLITUDE * 0.35 * CURVE_FREQ2
  );
}

// --- Río infinito (paisaje procedural que se recicla) ---
const trees = [];
const mountains = [];
const TREE_POOL = 60;
const MOUNTAIN_POOL = 12;
const SCENERY_RANGE = 800;  // distancia visible delantera
const RECYCLE_DIST = 80;     // distancia trasera para reciclar

// Materiales reutilizables para árboles y montañas
const trunkMat = new THREE.MeshStandardMaterial({ color: 0x5D4037 });
const foliageMats = [
  new THREE.MeshStandardMaterial({ color: 0x388E3C, flatShading: true }),
  new THREE.MeshStandardMaterial({ color: 0x43A047, flatShading: true }),
  new THREE.MeshStandardMaterial({ color: 0x2E7D32, flatShading: true }),
];
const mountainMat = new THREE.MeshStandardMaterial({ color: 0x7986CB, roughness: 1, flatShading: true });

// Geometrías reutilizables
const trunkGeom = new THREE.CylinderGeometry(0.3, 0.4, 3, 6);
const foliageGeom = new THREE.ConeGeometry(2, 5, 7);
const mountainGeom = new THREE.ConeGeometry(30, 22, 5);

// --- Río con curvas: cadena de segmentos cortos que siguen riverCurveX ---
const RIVER_SEG_COUNT = 40;
const RIVER_SEG_LEN = 25;       // longitud de cada segmento (solapa con vecinos)
const RIVER_SEG_SPACING = 20;   // distancia entre centros de segmentos
const WATER_HALF_WIDTH = 7;      // ancho del agua (mitad) — coincide con RIVER_WIDTH/2
const BANK_HALF_WIDTH = 30;      // ancho de cada orilla (mitad)

// --- Carteles de distancia cada 250 m ---
const SIGN_INTERVAL = 100;        // metros entre carteles
const SIGNS_POOL = 8;             // nº de carteles simultáneos
const METERS_PER_UNIT = 1.389;    // conversión unidades de mundo → metros (1 u/s = 5 km/h)
const signs = [];
let signPostGeom, signPostMat, signBoardGeom;

// --- Peces ---
const FISH_POOL = 6;
const fishes = [];

const waterSegs = [];
const bankLSegs = [];
const bankRSegs = [];

function buildRiver() {
  const waterMat = new THREE.MeshStandardMaterial({ color: 0x2E86C1, roughness: 0.3, metalness: 0.6, side: THREE.DoubleSide });
  const bankMat = new THREE.MeshStandardMaterial({ color: 0x2E7D32, roughness: 0.9, side: THREE.DoubleSide });
  const waterGeom = new THREE.PlaneGeometry(WATER_HALF_WIDTH * 2, RIVER_SEG_LEN);
  const bankGeom = new THREE.BoxGeometry(BANK_HALF_WIDTH * 2, 3, RIVER_SEG_LEN);

  for (let i = 0; i < RIVER_SEG_COUNT; i++) {
    // Agua
    const w = new THREE.Mesh(waterGeom, waterMat);
    w.rotation.x = -Math.PI / 2;
    w.receiveShadow = true;
    scene.add(w);
    waterSegs.push(w);

    // Orilla izquierda
    const bl = new THREE.Mesh(bankGeom, bankMat);
    bl.receiveShadow = true;
    bl.castShadow = true;
    scene.add(bl);
    bankLSegs.push(bl);

    // Orilla derecha
    const br = new THREE.Mesh(bankGeom, bankMat);
    br.receiveShadow = true;
    br.castShadow = true;
    scene.add(br);
    bankRSegs.push(br);
  }

  // --- Pool de árboles ---
  for (let i = 0; i < TREE_POOL; i++) {
    const tree = new THREE.Group();
    const trunk = new THREE.Mesh(trunkGeom, trunkMat);
    trunk.position.y = 1.5;
    trunk.castShadow = true;
    tree.add(trunk);

    const foliage = new THREE.Mesh(foliageGeom, foliageMats[i % 3]);
    foliage.position.y = 5;
    foliage.castShadow = true;
    tree.add(foliage);

    placeTree(tree, -i * (SCENERY_RANGE / TREE_POOL));
    scene.add(tree);
    trees.push(tree);
  }

  // --- Pool de montañas lejanas ---
  for (let i = 0; i < MOUNTAIN_POOL; i++) {
    const m = new THREE.Mesh(mountainGeom, mountainMat);
    placeMountain(m, -i * 80);
    scene.add(m);
    mountains.push(m);
  }
}

function placeTree(tree, z) {
  const side = Math.random() < 0.5 ? -1 : 1;
  const cx = riverCurveX(z);
  tree.position.x = cx + side * (WATER_HALF_WIDTH + 4 + Math.random() * 25);
  tree.position.z = z;
  tree.position.y = 0;
  tree.scale.setScalar(0.7 + Math.random() * 0.6);
  tree.rotation.y = Math.random() * Math.PI;
}

function placeMountain(m, z) {
  const side = Math.random() < 0.5 ? -1 : 1;
  const cx = riverCurveX(z);
  // Radio base de la montaña escalada + margen del río
  const scale = 1 + Math.random();
  const mountainRadius = 30 * scale;
  const minDistance = WATER_HALF_WIDTH + BANK_HALF_WIDTH + mountainRadius * 0.5;
  const extra = Math.random() * 30;
  m.position.set(cx + side * (minDistance + extra), 6, z);
  m.scale.set(scale, 0.8 + Math.random() * 0.5, scale);
}

function updateScenery() {
  if (!boat) return;
  const bz = boat.position.z;

  // Posicionar cada segmento de agua y orilla a lo largo de la curva
  for (let i = 0; i < RIVER_SEG_COUNT; i++) {
    const segZ = bz + (i - RIVER_SEG_COUNT / 2) * RIVER_SEG_SPACING;
    const cx = riverCurveX(segZ);
    const heading = riverHeading(segZ);

    // Agua: centrada en el río, rotada según heading
    const w = waterSegs[i];
    w.position.set(cx, 0, segZ);
    w.rotation.z = heading;

    // Orilla izquierda: desplazada a la izquierda del río
    const offset = -WATER_HALF_WIDTH - BANK_HALF_WIDTH;
    const bl = bankLSegs[i];
    bl.position.set(cx + Math.cos(heading) * offset, -1, segZ - Math.sin(heading) * offset);
    bl.rotation.y = heading;

    // Orilla derecha: desplazada a la derecha del río
    const offsetR = WATER_HALF_WIDTH + BANK_HALF_WIDTH;
    const br = bankRSegs[i];
    br.position.set(cx + Math.cos(heading) * offsetR, -1, segZ - Math.sin(heading) * offsetR);
    br.rotation.y = heading;
  }

  // Reciclar árboles que quedan detrás de la barca
  for (const tree of trees) {
    if (tree.position.z > bz + RECYCLE_DIST) {
      placeTree(tree, bz - SCENERY_RANGE - Math.random() * 50);
    }
  }

  // Reciclar montañas
  for (const m of mountains) {
    if (m.position.z > bz + RECYCLE_DIST) {
      placeMountain(m, bz - SCENERY_RANGE - Math.random() * 100);
    }
  }

  updateSigns();
}

// --- Carteles de distancia ---
function makeSignTexture(meters) {
  const c = document.createElement('canvas');
  c.width = 256; c.height = 128;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, 256, 128);
  ctx.fillStyle = '#000000';
  ctx.font = 'bold 52px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(meters + ' m', 128, 64);
  const tex = new THREE.CanvasTexture(c);
  return tex;
}

function buildSigns() {
  signBoardGeom = new THREE.BoxGeometry(2.2, 1.1, 0.1);

  for (let i = 0; i < SIGNS_POOL; i++) {
    const group = new THREE.Group();

    const board = new THREE.Mesh(signBoardGeom, new THREE.MeshStandardMaterial({ map: makeSignTexture(0) }));
    board.position.y = 1.0;
    board.castShadow = true;
    group.add(board);

    group.userData = { board, distance: 0, visible: false };
    group.visible = false;
    scene.add(group);
    signs.push(group);
  }
}

function updateSigns() {
  if (!boat) return;
  // Usar la mayor de: distancia BLE o distancia del juego
  const dist = Math.max(gameState.distance, gameState.gameDistance);
  const bz = gameState.boatZ;

  // Calcular qué múltiplos de 250m debemos mostrar
  // Mostramos carteles desde el último pasado hasta SIGNS_POOL por delante
  const lastPassed = Math.floor(dist / SIGN_INTERVAL) * SIGN_INTERVAL;

  for (let i = 0; i < SIGNS_POOL; i++) {
    const signDistance = lastPassed + (i + 1) * SIGN_INTERVAL;
    // Posición Z: si la distancia BLE y boatZ estuvieran perfectamente sincronizados,
    // el cartel estaría a (signDistance - dist) metros por delante del barco
    const metersAhead = signDistance - dist;
    const unitsAhead = metersAhead / METERS_PER_UNIT;
    const signZ = bz - unitsAhead;

    // Solo mostrar si está dentro del rango visible
    if (metersAhead < -SIGN_INTERVAL || metersAhead > SIGNS_POOL * SIGN_INTERVAL) {
      signs[i].visible = false;
      continue;
    }

    const sign = signs[i];
    sign.visible = true;

    // Actualizar textura si cambió la distancia
    if (sign.userData.distance !== signDistance) {
      sign.userData.distance = signDistance;
      const mat = sign.userData.board.material;
      if (mat.map) mat.map.dispose();
      mat.map = makeSignTexture(signDistance);
      mat.needsUpdate = true;
    }

    // Posicionar en la orilla derecha, siguiendo la curva del río
    const cx = riverCurveX(signZ);
    const heading = riverHeading(signZ);
    const sideOffset = WATER_HALF_WIDTH + 3;
    sign.position.x = cx + Math.cos(heading) * sideOffset;
    sign.position.z = signZ - Math.sin(heading) * sideOffset;
    sign.position.y = 0;
    sign.rotation.y = heading;
  }
}

// --- Peces que saltan a la superficie ---
function buildFishes() {
  const fishMat = new THREE.MeshStandardMaterial({ color: 0xC0C0C0, roughness: 0.3, metalness: 0.7, flatShading: true });
  const fishMat2 = new THREE.MeshStandardMaterial({ color: 0x607D8B, roughness: 0.3, metalness: 0.6, flatShading: true });
  for (let i = 0; i < FISH_POOL; i++) {
    const fish = new THREE.Group();
    const mat = i % 2 === 0 ? fishMat : fishMat2;
    const bodyGeom = new THREE.ConeGeometry(0.08, 0.4, 6);
    bodyGeom.rotateZ(Math.PI / 2);
    const body = new THREE.Mesh(bodyGeom, mat);
    fish.add(body);
    const tailGeom = new THREE.ConeGeometry(0.06, 0.12, 4);
    tailGeom.rotateY(Math.PI / 2);
    tailGeom.rotateZ(-Math.PI / 2);
    const tail = new THREE.Mesh(tailGeom, mat);
    tail.position.x = -0.26;
    fish.add(tail);
    fish.userData = { active: false, timer: 0, nextJump: 2 + Math.random() * 8 };
    fish.visible = false;
    scene.add(fish);
    fishes.push(fish);
  }
}

function updateFish(dt) {
  if (!boat) return;
  const bz = gameState.boatZ;
  for (const fish of fishes) {
    if (!fish.userData.active) {
      fish.userData.nextJump -= dt;
      if (fish.userData.nextJump <= 0) {
        const offsetZ = -5 - Math.random() * 30;
        const offsetX = (Math.random() - 0.5) * (WATER_HALF_WIDTH * 1.5);
        const z = bz + offsetZ;
        const cx = riverCurveX(z);
        const heading = riverHeading(z);
        fish.position.set(
          cx + Math.cos(heading) * offsetX,
          0,
          z - Math.sin(heading) * offsetX
        );
        fish.rotation.y = heading + Math.PI / 2;
        fish.userData.active = true;
        fish.userData.timer = 0;
        fish.userData.duration = 0.8 + Math.random() * 0.6;
        fish.visible = true;
      }
    } else {
      fish.userData.timer += dt;
      const p = fish.userData.timer / fish.userData.duration;
      if (p >= 1) {
        fish.userData.active = false;
        fish.visible = false;
        fish.userData.nextJump = 3 + Math.random() * 10;
      } else {
        const arc = Math.sin(p * Math.PI);
        fish.position.y = arc * 0.8;
        fish.rotation.z = arc * 0.6 * (fish.position.x < boat.position.x ? 1 : -1);
      }
    }
  }
}

// --- Genera la geometría del casco por lofting de secciones transversales ---
function buildHullGeometry() {
  const N = 28;   // estaciones a lo largo de la eslora
  const M = 12;   // vértices por media sección (de borda a quilla)
  const len = 6.5;
  const maxBeam = 1.25;
  const maxDepth = 0.5;

  // Perfil de manga (semi-ancho) a lo largo de la eslora
  // t=0 → proa (punta), t=1 → popa
  function halfBeam(t) {
    if (t < 0.02) return 0.008;
    // Proa más fina; manga máxima hacia el 35-40%; popa más redondeada
    const bowFine = Math.pow(t, 0.65);
    return maxBeam * 0.5 * Math.sin(Math.PI * bowFine) * 0.95 + maxBeam * 0.02;
  }
  // Perfil de profundidad del casco
  function depth(t) {
    if (t < 0.02) return 0.01;
    return maxDepth * Math.sin(Math.PI * Math.pow(t, 0.55) * 0.92);
  }
  // Altura de la borda (sheer) — ligeramente más alta en proa y popa
  function sheer(t) {
    return 0.12 + Math.sin(t * Math.PI) * 0.06 + Math.pow(1 - t, 2) * 0.08;
  }

  const verts = [];
  // Cada estación genera (M+1) vértices: de borda de estribor → quilla → borda de babor
  for (let i = 0; i <= N; i++) {
    const t = i / N;
    const z = -len / 2 + t * len;
    const hb = halfBeam(t);
    const d = depth(t);
    const sh = sheer(t);

    for (let j = 0; j <= M; j++) {
      const angle = (j / M) * Math.PI; // 0 = estribor, π/2 = fondo, π = babor
      const x = hb * Math.cos(angle);
      const y = sh - d * Math.sin(angle);
      verts.push(x, y, z);
    }
  }

  const idx = [];
  for (let i = 0; i < N; i++) {
    for (let j = 0; j < M; j++) {
      const a = i * (M + 1) + j;
      const b = a + 1;
      const c = (i + 1) * (M + 1) + j;
      const dd = c + 1;
      idx.push(a, c, b);
      idx.push(b, c, dd);
    }
  }

  const geom = new THREE.BufferGeometry();
  geom.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
  geom.setIndex(idx);
  geom.computeVertexNormals();
  return geom;
}

// --- Geometría de la cubierta (deck) con cala abierta ---
function buildDeckGeometry() {
  const N = 28;
  const len = 6.5;
  const maxBeam = 1.25;
  const cockpitZ0 = -0.9; // inicio de la cala (hacia proa)
  const cockpitZ1 = 1.3;  // fin de la cala (hacia popa)

  function halfBeam(t) {
    if (t < 0.02) return 0.008;
    const bowFine = Math.pow(t, 0.65);
    return maxBeam * 0.5 * Math.sin(Math.PI * bowFine) * 0.95 + maxBeam * 0.02;
  }
  function sheer(t) {
    return 0.12 + Math.sin(t * Math.PI) * 0.06 + Math.pow(1 - t, 2) * 0.08;
  }

  const verts = [];
  const idx = [];

  // Generar dos tiras de cubierta: proa (t < cockpitZ0) y popa (t > cockpitZ1)
  // Cada sección es un triángulo que cierra de borda a borda
  let vBase = 0;
  for (let i = 0; i <= N; i++) {
    const t = i / N;
    const z = -len / 2 + t * len;
    if (z > cockpitZ0 && z < cockpitZ1) continue; // saltar la cala

    const hb = halfBeam(t);
    const sh = sheer(t);
    // Un solo vértice en el centro (simplificación: triángulo por sección)
    verts.push(0, sh, z);          // centro
    verts.push(hb, sh, z);         // estribor
    verts.push(-hb, sh, z);        // babor
  }

  // Crear triángulos para cerrar la cubierta entre estaciones consecutivas
  // Encontrar los índices de estaciones válidas
  const validStations = [];
  for (let i = 0; i <= N; i++) {
    const t = i / N;
    const z = -len / 2 + t * len;
    if (!(z > cockpitZ0 && z < cockpitZ1)) validStations.push(i);
  }

  for (let k = 0; k < validStations.length - 1; k++) {
    const i0 = validStations[k];
    const i1 = validStations[k + 1];
    // Solo conectar si son adyacentes o del mismo segmento
    if (i1 !== i0 + 1) continue; // saltar el salto de la cala

    const a = k * 3;       // centro0
    const b = k * 3 + 1;   // estribor0
    const c = k * 3 + 2;   // babor0
    const d = (k + 1) * 3;     // centro1
    const e = (k + 1) * 3 + 1; // estribor1
    const f = (k + 1) * 3 + 2; // babor1

    idx.push(a, b, d);
    idx.push(d, b, e);
    idx.push(a, d, c);
    idx.push(c, d, f);
  }

  const geom = new THREE.BufferGeometry();
  geom.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
  geom.setIndex(idx);
  geom.computeVertexNormals();
  return geom;
}

// --- Barca (shell de competición con casco lofted) ---
function buildBoat() {
  boat = new THREE.Group();

  // --- Casco (hull) ---
  const hullGeom = buildHullGeometry();
  const hullMat = new THREE.MeshStandardMaterial({ color: 0xB71C1C, roughness: 0.35, metalness: 0.35, flatShading: false, side: THREE.DoubleSide });
  const hull = new THREE.Mesh(hullGeom, hullMat);
  hull.castShadow = true;
  hull.receiveShadow = true;
  boat.add(hull);

  // --- Cubierta (deck) ---
  const deckGeom = buildDeckGeometry();
  const deckMat = new THREE.MeshStandardMaterial({ color: 0x880E4F, roughness: 0.4, metalness: 0.25, side: THREE.DoubleSide });
  const deck = new THREE.Mesh(deckGeom, deckMat);
  deck.castShadow = true;
  deck.receiveShadow = true;
  boat.add(deck);

  // --- Suelo interior de la cala (sigue la forma del casco, tapa el agua) ---
  {
    const cN = 14;
    const cLen = 6.5;
    const cMaxBeam = 1.25;
    const cZ0 = -1.6, cZ1 = 1.3;
    const floorY = 0.05;
    function cHalfBeam(t) {
      if (t < 0.02) return 0.008;
      const bowFine = Math.pow(t, 0.65);
      return cMaxBeam * 0.5 * Math.sin(Math.PI * bowFine) * 0.95 + cMaxBeam * 0.02;
    }
    const fVerts = [];
    const fIdx = [];
    for (let i = 0; i <= cN; i++) {
      const t = i / cN;
      const z = cZ0 + t * (cZ1 - cZ0);
      const tt = (z + cLen / 2) / cLen;
      const hb = cHalfBeam(tt) * 0.82;
      fVerts.push(-hb, floorY, z, hb, floorY, z);
    }
    for (let i = 0; i < cN; i++) {
      const a = i * 2, b = a + 1, c = a + 2, dd = a + 3;
      fIdx.push(a, c, b, b, c, dd);
    }
    const cockpitFloorGeom = new THREE.BufferGeometry();
    cockpitFloorGeom.setAttribute('position', new THREE.Float32BufferAttribute(fVerts, 3));
    cockpitFloorGeom.setIndex(fIdx);
    cockpitFloorGeom.computeVertexNormals();
    const cockpitFloorMat = new THREE.MeshStandardMaterial({ color: 0x5D4037, roughness: 0.85, metalness: 0.05, side: THREE.DoubleSide });
    const cockpitFloor = new THREE.Mesh(cockpitFloorGeom, cockpitFloorMat);
    cockpitFloor.receiveShadow = true;
    boat.add(cockpitFloor);
  }

  // --- Listón decorativo a lo largo de la borda (rub rail / cintón) ---
  const railPoints = [];
  const N = 28;
  const len = 6.5;
  const maxBeam = 1.25;
  function halfBeam(t) {
    if (t < 0.02) return 0.008;
    const bowFine = Math.pow(t, 0.65);
    return maxBeam * 0.5 * Math.sin(Math.PI * bowFine) * 0.95 + maxBeam * 0.02;
  }
  function sheer(t) {
    return 0.12 + Math.sin(t * Math.PI) * 0.06 + Math.pow(1 - t, 2) * 0.08;
  }
  for (let i = 0; i <= N; i++) {
    const t = i / N;
    const z = -len / 2 + t * len;
    const hb = halfBeam(t);
    const sh = sheer(t);
    railPoints.push(new THREE.Vector3(hb, sh + 0.005, z));
  }
  // Estribor
  const railGeomS = new THREE.TubeGeometry(new THREE.CatmullRomCurve3(railPoints), 60, 0.018, 6, false);
  const railMat = new THREE.MeshStandardMaterial({ color: 0xFFD600, roughness: 0.3, metalness: 0.5 });
  const railS = new THREE.Mesh(railGeomS, railMat);
  railS.castShadow = true;
  boat.add(railS);
  // Babor (mirror)
  const railPointsB = railPoints.map(p => new THREE.Vector3(-p.x, p.y, p.z));
  const railGeomB = new THREE.TubeGeometry(new THREE.CatmullRomCurve3(railPointsB), 60, 0.018, 6, false);
  const railB = new THREE.Mesh(railGeomB, railMat);
  railB.castShadow = true;
  boat.add(railB);

  // --- Carril deslizante del asiento ---
  const railTrackGeom = new THREE.BoxGeometry(0.7, 0.03, 1.1);
  const railTrackMat = new THREE.MeshStandardMaterial({ color: 0xCFD8DC, roughness: 0.25, metalness: 0.8 });
  const railTrack = new THREE.Mesh(railTrackGeom, railTrackMat);
  railTrack.position.set(0, 0.12, 0.2);
  boat.add(railTrack);

  // --- Asiento deslizante ---
  const seatGeom = new THREE.BoxGeometry(0.5, 0.06, 0.28);
  const seatMat = new THREE.MeshStandardMaterial({ color: 0x263238, roughness: 0.55 });
  const seat = new THREE.Mesh(seatGeom, seatMat);
  seat.position.set(0, 0.17, 0.2);
  seat.name = 'seat';
  seat.castShadow = true;
  boat.add(seat);

  // --- Reposapiés (footboards) ---
  const footGeom = new THREE.BoxGeometry(0.6, 0.35, 0.04);
  const footMat = new THREE.MeshStandardMaterial({ color: 0x37474F, roughness: 0.7 });
  const footboard = new THREE.Mesh(footGeom, footMat);
  footboard.position.set(0, 0.2, -1.05);
  footboard.rotation.x = -0.25;
  footboard.castShadow = true;
  boat.add(footboard);

  // --- Oarlocks (topes de los remos) ---
  const lockMat = new THREE.MeshStandardMaterial({ color: 0xB0BEC5, roughness: 0.2, metalness: 0.9 });
  for (const side of [-1, 1]) {
    const lockBaseGeom = new THREE.BoxGeometry(0.08, 0.04, 0.06);
    const lockBase = new THREE.Mesh(lockBaseGeom, lockMat);
    lockBase.position.set(side * 0.5, 0.2, -0.35);
    lockBase.castShadow = true;
    boat.add(lockBase);

    const pinGeom = new THREE.CylinderGeometry(0.015, 0.015, 0.1, 8);
    const pin = new THREE.Mesh(pinGeom, lockMat);
    pin.position.set(side * 0.5, 0.26, -0.35);
    boat.add(pin);
  }

  // --- Pivote del remero (sobre el asiento) ---
  rower = new THREE.Group();
  rower.position.set(0, 0.2, 0.2);
  boat.add(rower);
  buildRowerBody();

  // --- Remos ---
  oarLeft = buildOar(-1);
  oarLeft.position.set(-0.5, 0.26, -0.35);
  oarLeft.userData.side = -1;
  boat.add(oarLeft);

  oarRight = buildOar(1);
  oarRight.position.set(0.5, 0.26, -0.35);
  oarRight.userData.side = 1;
  boat.add(oarRight);

  // Ajustar la animación del asiento para el nuevo rango
  boat.position.set(0, 0, 0);
  scene.add(boat);
}

// --- Remo realista: mango, fuste largo y pala plana ---
function buildOar(side) {
  const oar = new THREE.Group();

  const shaftMat = new THREE.MeshStandardMaterial({ color: 0x5D4037, roughness: 0.6, metalness: 0.1 });
  const handleMat = new THREE.MeshStandardMaterial({ color: 0x3E2723, roughness: 0.8 });
  const bladeMat = new THREE.MeshStandardMaterial({ color: 0xE65100, roughness: 0.4, metalness: 0.3, flatShading: false });
  const collarMat = new THREE.MeshStandardMaterial({ color: 0xCFD8DC, roughness: 0.3, metalness: 0.7 });

  const s = side || 1; // dirección X

  // Fuste (shaft) — cilindro largo, desde el oarlock hacia fuera
  const shaftLen = 2.25;
  const shaftGeom = new THREE.CylinderGeometry(0.035, 0.045, shaftLen, 12);
  shaftGeom.rotateZ(Math.PI / 2);
  const shaft = new THREE.Mesh(shaftGeom, shaftMat);
  shaft.position.x = (s * shaftLen) / 2;
  shaft.castShadow = true;
  oar.add(shaft);

  // Fuste interior (desde el oarlock hacia el centro, donde van las manos)
  const innerShaftLen = 0.5;
  const innerShaftGeom = new THREE.CylinderGeometry(0.04, 0.04, innerShaftLen, 12);
  innerShaftGeom.rotateZ(Math.PI / 2);
  const innerShaft = new THREE.Mesh(innerShaftGeom, shaftMat);
  innerShaft.position.x = -s * innerShaftLen / 2;
  innerShaft.castShadow = true;
  oar.add(innerShaft);

  // Mango (donde agarran las manos) — en el extremo interior, con grip
  const handleGeom = new THREE.CylinderGeometry(0.055, 0.05, 0.25, 12);
  handleGeom.rotateZ(Math.PI / 2);
  const handle = new THREE.Mesh(handleGeom, handleMat);
  handle.position.x = -s * (innerShaftLen + 0.2);
  handle.castShadow = true;
  oar.add(handle);

  // Collar / tope (junto al oarlock)
  const collarGeom = new THREE.CylinderGeometry(0.06, 0.06, 0.08, 12);
  collarGeom.rotateZ(Math.PI / 2);
  const collar = new THREE.Mesh(collarGeom, collarMat);
  collar.position.x = s * 0.04;
  oar.add(collar);

  // Pala (blade) — plana y asimétrica, en el extremo exterior
  // Usamos una forma personalizada con ExtrudeGeometry o un Box ahusado
  const bladeGeom = new THREE.BoxGeometry(0.7, 0.03, 0.3, 4, 1, 2);
  // Ahusar la pala: más estrecha en el extremo
  const bp = bladeGeom.attributes.position;
  for (let i = 0; i < bp.count; i++) {
    const x = bp.getX(i);
    // x va de 0..0.7; estrechar en el extremo lejano
    const taper = 1.0 - (x / 0.7) * 0.45;
    bp.setZ(i, bp.getZ(i) * taper);
  }
  bladeGeom.computeVertexNormals();
  const blade = new THREE.Mesh(bladeGeom, bladeMat);
  blade.position.x = s * (shaftLen + 0.2625);
  blade.castShadow = true;
  oar.add(blade);

  return oar;
}

// --- Personaje remero detallado (mayor resolución, anatomía articulada) ---
function buildRowerBody() {
  const skinMat = new THREE.MeshStandardMaterial({ color: 0xFFD3A5, roughness: 0.6, flatShading: false });
  const shirtMat = new THREE.MeshStandardMaterial({ color: 0xC62828, roughness: 0.5, flatShading: false });
  const pantsMat = new THREE.MeshStandardMaterial({ color: 0x1A237E, roughness: 0.6, flatShading: false });
  const hairMat = new THREE.MeshStandardMaterial({ color: 0x3E2723, roughness: 0.8 });
  const shoeMat = new THREE.MeshStandardMaterial({ color: 0x212121, roughness: 0.7 });

  // --- Torso: torso + caderas como groups separados para articulación ---
  // Hips (cadera, base del torso)
  const hips = new THREE.Group();
  hips.position.y = 0;
  rower.add(hips);
  rower.userData.hips = hips;

  const hipGeom = new THREE.BoxGeometry(0.55, 0.22, 0.35);
  const hip = new THREE.Mesh(hipGeom, pantsMat);
  hip.castShadow = true;
  hips.add(hip);

  // Spine / torso superior (pivot en la cadera para inclinarse)
  const spine = new THREE.Group();
  spine.position.y = 0.11;
  hips.add(spine);
  rower.userData.spine = spine;

  const torsoGeom = new THREE.BoxGeometry(0.58, 0.65, 0.32);
  // Redondear ligeramente el torso escalando los vértices superiores
  const torso = new THREE.Mesh(torsoGeom, shirtMat);
  torso.position.y = 0.33;
  torso.castShadow = true;
  spine.add(torso);

  // Pecho / pecho (un poco más ancho arriba)
  const chestGeom = new THREE.BoxGeometry(0.6, 0.2, 0.34);
  const chest = new THREE.Mesh(chestGeom, shirtMat);
  chest.position.y = 0.6;
  chest.castShadow = true;
  spine.add(chest);

  // Cuello
  const neckGeom = new THREE.CylinderGeometry(0.09, 0.1, 0.12, 10);
  const neck = new THREE.Mesh(neckGeom, skinMat);
  neck.position.y = 0.73;
  neck.castShadow = true;
  spine.add(neck);

  // Cabeza (alta resolución)
  const headGeom = new THREE.SphereGeometry(0.17, 20, 16);
  const head = new THREE.Mesh(headGeom, skinMat);
  head.position.y = 0.9;
  head.castShadow = true;
  spine.add(head);

  // Pelo (media esfera encima de la cabeza)
  const hairGeom = new THREE.SphereGeometry(0.185, 16, 12, 0, Math.PI * 2, 0, Math.PI * 0.55);
  const hair = new THREE.Mesh(hairGeom, hairMat);
  hair.position.y = 0.9;
  spine.add(hair);

  // --- Brazos articulados: hombro → bíceps → codo → antebrazo → mano ---
  // Cada brazo cuelga del spine (hombros a la altura del pecho)
  for (const side of [-1, 1]) {
    const sideKey = side === -1 ? 'L' : 'R';

    // Hombro (pivot)
    const shoulder = new THREE.Group();
    shoulder.position.set(side * 0.34, 0.6, 0);
    spine.add(shoulder);

    // Bíceps (upper arm) — cilindro
    const upperArmGeom = new THREE.CylinderGeometry(0.07, 0.065, 0.38, 12);
    const upperArm = new THREE.Mesh(upperArmGeom, shirtMat);
    upperArm.position.y = -0.19;
    upperArm.castShadow = true;
    shoulder.add(upperArm);

    // Codo (pivot al final del bíceps)
    const elbow = new THREE.Group();
    elbow.position.y = -0.38;
    shoulder.add(elbow);

    // Antebrazo (forearm) — cilindro, piel
    const forearmGeom = new THREE.CylinderGeometry(0.055, 0.05, 0.36, 12);
    const forearm = new THREE.Mesh(forearmGeom, skinMat);
    forearm.position.y = -0.18;
    forearm.castShadow = true;
    elbow.add(forearm);

    // Mano (esfera achatada)
    const handGeom = new THREE.SphereGeometry(0.065, 10, 8);
    handGeom.scale(1, 0.8, 0.5);
    const hand = new THREE.Mesh(handGeom, skinMat);
    hand.position.y = -0.38;
    hand.castShadow = true;
    elbow.add(hand);

    rower.userData['shoulder' + sideKey] = shoulder;
    rower.userData['elbow' + sideKey] = elbow;
    rower.userData['hand' + sideKey] = hand;
  }

  // --- Piernas: cadera → muslo → rodilla → espinilla → pie ---
  // Orientadas hacia adelante (proa, -Z), horizontales con rodillas elevadas
  for (const side of [-1, 1]) {
    const sideKey = side === -1 ? 'L' : 'R';

    // Hip joint (pivot en la cadera)
    const hipJoint = new THREE.Group();
    hipJoint.position.set(side * 0.14, -0.02, 0);
    hips.add(hipJoint);

    // Muslo (thigh) — cilindro acostado horizontal apuntando hacia adelante (-Z)
    const thighLen = 0.55;
    const thighGeom = new THREE.CylinderGeometry(0.1, 0.09, thighLen, 12);
    thighGeom.rotateX(-Math.PI / 2); // acostar a lo largo de -Z
    const thigh = new THREE.Mesh(thighGeom, pantsMat);
    thigh.position.z = -thighLen / 2; // centro desplazado hacia adelante
    thigh.castShadow = true;
    hipJoint.add(thigh);

    // Rodilla (pivot al final del muslo, ligeramente elevada)
    const knee = new THREE.Group();
    knee.position.set(0, 0.06, -thighLen);
    hipJoint.add(knee);

    // Espinilla (shin) — cilindro que cuelga de la rodilla, hacia abajo
    const shinLen = 0.5;
    const shinGeom = new THREE.CylinderGeometry(0.08, 0.06, shinLen, 12);
    const shin = new THREE.Mesh(shinGeom, skinMat);
    shin.position.y = -shinLen / 2;
    shin.castShadow = true;
    knee.add(shin);

    // Pie (apuntando hacia adelante, hacia el reposapiés)
    const footGeom = new THREE.BoxGeometry(0.12, 0.08, 0.25);
    const foot = new THREE.Mesh(footGeom, shoeMat);
    foot.position.set(0, -shinLen, 0.06);
    foot.castShadow = true;
    knee.add(foot);

    rower.userData['hipJoint' + sideKey] = hipJoint;
    rower.userData['knee' + sideKey] = knee;
  }
}

// --- Animación de remada: cuerpo, brazos, piernas y remos sincronizados ---
function syncArmsToOars() {
  if (!oarLeft || !oarRight || !rower || !boat) return;
  const L1 = 0.38; // bíceps (hombro → codo)
  const L2 = 0.36; // antebrazo (codo → mano)

  [['L', oarLeft, -1], ['R', oarRight, 1]].forEach(([sideKey, oar, side]) => {
    const shoulder = rower.userData['shoulder' + sideKey];
    const elbow = rower.userData['elbow' + sideKey];
    if (!shoulder || !elbow) return;

    // Posición del mango del remo en mundo (extremo interior)
    oar.updateMatrixWorld();
    const handleWorld = new THREE.Vector3(-side * 0.625, 0, 0);
    oar.localToWorld(handleWorld);

    // Posición del hombro en mundo
    const shoulderWorld = new THREE.Vector3();
    shoulder.getWorldPosition(shoulderWorld);

    // Transformar al espacio local del spine (parent del hombro)
    const spine = shoulder.parent;
    spine.updateMatrixWorld();
    const invSpine = new THREE.Matrix4().copy(spine.matrixWorld).invert();
    const handleLocal = handleWorld.clone().applyMatrix4(invSpine);
    const shoulderLocal = shoulderWorld.clone().applyMatrix4(invSpine);

    // Vector relativo (hombro → mango) proyectado en plano YZ
    const dy = handleLocal.y - shoulderLocal.y;
    const dz = handleLocal.z - shoulderLocal.z;

    // Distancia clampeada al rango del brazo
    let dist = Math.sqrt(dy * dy + dz * dz);
    dist = Math.max(Math.abs(L1 - L2) + 0.01, Math.min(L1 + L2 - 0.01, dist));

    // IK 2-huesos: ley de cosenos
    const cosElbow = (dist * dist - L1 * L1 - L2 * L2) / (2 * L1 * L2);
    const elbowAngle = Math.acos(Math.max(-1, Math.min(1, cosElbow)));

    const cosShoulder = (L1 * L1 + dist * dist - L2 * L2) / (2 * L1 * dist);
    const shoulderInternal = Math.acos(Math.max(-1, Math.min(1, cosShoulder)));

    // Ángulo del objetivo desde -Y hacia -Z (adelante)
    const targetAngle = Math.atan2(-dz, -dy);

    // Codo flexiona hacia adelante (antebrazo hacia -Z respecto al bíceps)
    shoulder.rotation.x = targetAngle - shoulderInternal;
    elbow.rotation.x = elbowAngle;
  });
}

function updateRowerAnimation(dt) {
  const cadence = gameState.cadence;
  if (cadence > 0) {
    const cycleTime = 60 / cadence;
    gameState.strokePhase += dt / cycleTime;
    if (gameState.strokePhase >= 1) {
      gameState.strokePhase -= 1;
      // Si era remada manual, no reiniciar ciclo automáticamente
      if (gameState._manualStroke && gameState._manualStroke > 0) {
        gameState._manualStroke = 0;
        gameState.cadence = 0;
        gameState.strokePhase = 0;
        $sCadence.textContent = '0 spm';
      }
    }
  } else if (gameState.strokePhase > 0.001) {
    gameState.strokePhase = gameState.strokePhase * 0.92;
  } else {
    gameState.strokePhase = 0;
  }

  const phase = gameState.strokePhase;

  // stroke: 0 = catch (cuerpo adelante, brazos extendidos), 1 = finish (cuerpo atrás, brazos flexionados)
  // Fase 0..0.35 = drive (tirón: 0→1), Fase 0.35..1 = recovery (1→0)
  let drive;
  if (phase < 0.35) {
    drive = Math.sin((phase / 0.35) * Math.PI / 2); // 0..1 (suave)
  } else {
    drive = Math.cos(((phase - 0.35) / 0.65) * Math.PI / 2); // 1..0
  }

  // ease para suavizar
  const d = drive;

  // --- Torso: inclina hacia atrás en el finish (drive=1), adelante en el catch (drive=0) ---
  if (rower.userData.spine) {
    // De -0.35 (adelante) a +0.25 (atrás)
    rower.userData.spine.rotation.x = -0.35 + d * 0.6;
  }

  // --- Hips: el asiento se desliza hacia delante (catch) y hacia atrás (finish) ---
  // Catch (d=0): asiento adelantado cerca del reposapiés (-Z)
  // Finish (d=1): asiento retrasado, piernas estiradas (+Z)
  if (rower.userData.hips) {
    rower.userData.hips.position.z = -0.25 + d * 0.45;
  }
  const seatMesh = boat.getObjectByName('seat');
  if (seatMesh) {
    seatMesh.position.z = -0.05 + d * 0.5;
  }

  // --- Brazos: controlados por IK (syncArmsToOars) al final de la función ---

  // --- Piernas: flexionadas con rodillas altas en el catch (d=0), estiradas en el finish (d=1) ---
  ['L', 'R'].forEach(sideKey => {
    const hipJoint = rower.userData['hipJoint' + sideKey];
    const knee = rower.userData['knee' + sideKey];
    if (hipJoint) {
      // Catch: muslo elevado (rodillas arriba). Finish: muslo horizontal/extendido.
      // Rotación X positiva levanta el extremo -Z (la rodilla) hacia arriba
      hipJoint.rotation.x = 0.4 - d * 0.5; // de 0.4 (rodillas altas) a -0.1 (extendido)
    }
    if (knee) {
      // Catch: espinilla casi vertical (cuelga de la rodilla alta hacia el pie).
      // Finish: espinilla horizontal (pierna estirada hacia el reposapiés).
      // Rotación X positiva mueve -Y (abajo) hacia -Z (adelante)
      knee.rotation.x = 0.15 + d * 1.25; // de 0.15 (vertical) a 1.4 (horizontal)
    }
  });

  // --- Remos: ángulos fijos sincronizados con la remada ---
  // El remo pivota en el oarlock; su rotación sigue la fase de drive
  // Transición suave de levantamiento de la pala (sin saltos bruscos)
  let bladeLift;
  if (phase < 0.35) {
    bladeLift = 0;                                  // drive: pala en el agua
  } else if (phase < 0.45) {
    bladeLift = (phase - 0.35) / 0.1;               // salida del agua (0→1)
  } else if (phase < 0.9) {
    bladeLift = 1;                                  // recovery: pala levantada
  } else {
    bladeLift = 1 - (phase - 0.9) / 0.1;           // entrada al agua (1→0)
  }

  if (oarLeft) {
    oarLeft.rotation.x = -0.8 + d * 1.5;            // catch: adelante (-0.8), finish: atrás (0.7)
    oarLeft.rotation.y = -0.15;                      // ligero ángulo horizontal
    oarLeft.rotation.z = bladeLift * 0.4;           // elevar pala en recovery
  }
  if (oarRight) {
    oarRight.rotation.x = -0.8 + d * 1.5;
    oarRight.rotation.y = 0.15;
    oarRight.rotation.z = -bladeLift * 0.4;
  }

  // --- Sincronizar brazos con el mango del remo (IK) ---
  // Los remos pivotan en el oarlock; los brazos siguen el mango
  syncArmsToOars();

  // --- Balanceo de la barca ---
  if (boat) {
    boat.rotation.z = Math.sin(phase * Math.PI * 2) * 0.02;
    boat.rotation.x = Math.sin(phase * Math.PI * 2) * 0.015;
    boat.position.y = Math.sin(phase * Math.PI * 2) * 0.04 + 0.12;
  }
}

// --- Movimiento de la barca (delegado al modelo físico) ---
function updateBoatMovement(dt) {
  updateBoatPhysics(dt);
}

    elbow.position.y = -0.38;
    shoulder.add(elbow);

    const forearm = new THREE.Mesh(new THREE.CylinderGeometry(0.055, 0.05, 0.36, 8), skinMat);
    forearm.position.y = -0.18;
    forearm.castShadow = true;
    elbow.add(forearm);

    arms.push({ shoulder, elbow });
  }

  group.userData = { spine, hips, arms };
  return group;
}

function buildSimpleBoat(hullColor, shirtColor) {
  const hullMat = new THREE.MeshStandardMaterial({ color: hullColor, roughness: 0.35, metalness: 0.35, side: THREE.DoubleSide });
  const hull = new THREE.Mesh(buildHullGeometry(), hullMat);
  hull.castShadow = true;
  hull.receiveShadow = true;

  const deckMat = new THREE.MeshStandardMaterial({ color: hullColor, roughness: 0.4, metalness: 0.25, side: THREE.DoubleSide });
  const deck = new THREE.Mesh(buildDeckGeometry(), deckMat);
  deck.castShadow = true;
  deck.receiveShadow = true;

  const group = new THREE.Group();
  group.add(hull);
  group.add(deck);

  const botRower = buildSimpleRower(hullColor, shirtColor);
  group.add(botRower);
  group.userData.rower = botRower;

  // Remos simplificados
  const oars = [];
  for (const side of [-1, 1]) {
    const oar = new THREE.Group();
    oar.position.set(side * 0.5, 0.26, -0.35);

    const shaftMat = new THREE.MeshStandardMaterial({ color: 0x5D4037, roughness: 0.6 });
    const bladeMat = new THREE.MeshStandardMaterial({ color: 0xE65100, roughness: 0.4 });

    const shaftGeom = new THREE.CylinderGeometry(0.035, 0.045, 2.25, 8);
    shaftGeom.rotateZ(Math.PI / 2);
    const shaft = new THREE.Mesh(shaftGeom, shaftMat);
    shaft.position.x = side * 1.125;
    shaft.castShadow = true;
    oar.add(shaft);

    const blade = new THREE.Mesh(new THREE.BoxGeometry(0.525, 0.03, 0.3), bladeMat);
    blade.position.x = side * 2.5125;
    blade.castShadow = true;
    oar.add(blade);

    group.add(oar);
    oars.push({ mesh: oar, side });
  }
  group.userData.oars = oars;

  return group;
}

function buildBots() {
  for (const cfg of BOT_CONFIGS) {
    const botBoat = buildSimpleBoat(cfg.color, cfg.color);
    botBoat.userData.velocity = cfg.velocity;
    botBoat.userData.cadence = cfg.cadence;
    botBoat.userData.lane = cfg.lane;
    botBoat.userData.name = cfg.name;
    botBoat.userData.phase = Math.random();
    botBoat.userData.zOffset = -10 - Math.random() * 40;
    const bz = gameState.boatZ + botBoat.userData.zOffset;
    botBoat.position.set(riverCurveX(bz) + cfg.lane, 0, bz);
    botBoat.rotation.y = riverHeading(bz);
    scene.add(botBoat);
    bots.push(botBoat);
  }
}

function updateBots(dt) {
  for (const bot of bots) {
    const ud = bot.userData;
    const cadence = ud.cadence;

    if (cadence > 0) {
      const cycleTime = 60 / cadence;
      ud.phase = (ud.phase + dt / cycleTime) % 1;
    }

    const phase = ud.phase;
    let drive;
    if (phase < 0.35) {
      drive = Math.sin((phase / 0.35) * Math.PI / 2);
    } else {
      drive = Math.cos(((phase - 0.35) / 0.65) * Math.PI / 2);
    }
    const d = drive;

    // Animar remero del bot
    const botRower = ud.rower;
    if (botRower) {
      if (botRower.userData.spine) {
        botRower.userData.spine.rotation.x = -0.35 + d * 0.6;
      }
      if (botRower.userData.hips) {
        botRower.userData.hips.position.z = -0.25 + d * 0.45;
      }
      for (const arm of botRower.userData.arms) {
        arm.shoulder.rotation.x = 1.1 - d * 1.5;
        arm.elbow.rotation.x = d * 1.4;
      }
    }

    // Animar remos del bot
    const inWater = phase < 0.4 ? 1 : 0;
    for (const oarInfo of ud.oars) {
      const oar = oarInfo.mesh;
      const side = oarInfo.side;
      oar.rotation.x = -0.8 + d * 1.5;
      oar.rotation.y = side === -1 ? -0.15 : 0.15;
      oar.rotation.z = (side === -1 ? 1 : -1) * (1 - inWater) * 0.4;
    }

    // Mover bot
    bot.position.z -= ud.velocity * dt;

    // Reciclar si está muy lejos delante o detrás del jugador
    const distFromPlayer = bot.position.z - gameState.boatZ;
    if (distFromPlayer < -120) {
      bot.position.z = gameState.boatZ + 30 + Math.random() * 20;
    } else if (distFromPlayer > 60) {
      bot.position.z = gameState.boatZ - 60 - Math.random() * 30;
    }

    // Seguir la curva del río (X + heading)
    const bz = bot.position.z;
    const cx = riverCurveX(bz);
    bot.position.x = cx + ud.lane;
    bot.rotation.y = riverHeading(bz);

    // Balanceo suave
    bot.rotation.z = Math.sin(phase * Math.PI * 2) * 0.02;
    bot.position.y = Math.sin(phase * Math.PI * 2) * 0.04 + 0.05;
  }
}

// --- Cámara ---
function updateCamera(dt) {
  if (!boat) return;
  const bx = boat.position.x;
  const bz = boat.position.z;
  const heading = boat.rotation.y;
  // Vectores local→mundo: forward apunta hacia -Z del barco rotado
  const sinH = Math.sin(heading), cosH = Math.cos(heading);

  let targetX, targetY, targetZ;
  let lookX, lookY, lookZ;

  if (cameraMode === 0) {
    // Trasera: detrás (+Z local) y por encima
    targetX = bx + sinH * 7;
    targetY = 4;
    targetZ = bz + cosH * 7;
    lookX = bx - sinH * 5; lookY = 1; lookZ = bz - cosH * 5;
  } else if (cameraMode === 1) {
    // Lateral (perpendicular al rumbo)
    targetX = bx + cosH * 8;
    targetY = 3;
    targetZ = bz - sinH * 8;
    lookX = bx; lookY = 1; lookZ = bz;
  } else {
    // Cinemática: más alta y lejana
    targetX = bx + sinH * 12 + cosH * 3;
    targetY = 10;
    targetZ = bz + cosH * 12 - sinH * 3;
    lookX = bx; lookY = 0; lookZ = bz - cosH * 10;
  }

  camera.position.x += (targetX - camera.position.x) * 0.05;
  camera.position.y += (targetY - camera.position.y) * 0.05;
  camera.position.z += (targetZ - camera.position.z) * 0.05;
  camera.lookAt(lookX, lookY, lookZ);
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
  requestAnimationFrame(animate);
  if (paused) { renderer.render(scene, camera); return; }
  const dt = Math.min(clock.getDelta(), 0.1);

  updateRowerAnimation(dt);
  updateBoatMovement(dt);
  updateBots(dt);
  updateCamera(dt);
  updateScenery();
  updateFish(dt);

  renderer.render(scene, camera);
}

const uuid = (n) => '0000' + n.toString(16).padStart(4,'0') + '-0000-1000-8000-00805f9b34fb';
const DOMYOS_SERVICE_UUID = '49535343-fe7d-4ae5-8fa9-9fafd205e455';
const DOMYOS_NOTIFY_UUID   = '49535343-1e4d-4bd9-ba61-23c647249616';
const DOMYOS_WRITE_UUID    = '49535343-8841-43f4-a8d4-ecbe34729bb3';
const DEVICE_INFO_SERVICE_UUID = uuid(0x180a);

const $btn     = document.getElementById('connect-btn');
const $log     = document.getElementById('log');
const $sSpeed  = document.getElementById('s-speed');
const $sCadence= document.getElementById('s-cadence');
const $sStrokes= document.getElementById('s-strokes');
const $sDist   = document.getElementById('s-distance');
const $sTime   = document.getElementById('s-time');
const $sResist = document.getElementById('s-resistance');
const $sCal    = document.getElementById('s-calories');
const $sHR     = document.getElementById('s-hr');
const $sIncl   = document.getElementById('s-incl');
const $sStatus = document.getElementById('s-status');

let device = null, server = null, writeChar = null, notifyChar = null;
let keepaliveInterval = null;

function setStatus(msg, ok) {
  $sStatus.textContent = msg;
  $sStatus.className = 'stat-value ' + (ok ? 'connected' : 'disconnected');
}
function logRaw(cls, text) {
  const now = new Date().toLocaleTimeString('es-ES', { hour12: false });
  const line = document.createElement('div');
  line.innerHTML = `<span class="${cls}">${now} ${text}</span>`;
  $log.appendChild(line);
  $log.scrollTop = $log.scrollHeight;
  while ($log.children.length > 50) $log.removeChild($log.firstChild);
}
function toHex(buf) {
  return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2,'0')).join(' ');
}
function checksum(bytes) { return bytes.reduce((a, b) => a + b, 0) & 0xFF; }

async function sendCommand(bytes) {
  if (!writeChar) return;
  const cmd = new Uint8Array(bytes);
  logRaw('cmd', `>>> TX: ${toHex(cmd.buffer)}`);
  try { await writeChar.writeValue(cmd); }
  catch(e) { logRaw('cmd', `Error: ${e.message}`); }
}

const INIT_COMMANDS = [
  [0xF0, 0xA3, 0x93],
  [0xF0, 0xA4, 0x94],
  [0xF0, 0xA5, 0x95],
  [0xF0, 0xAB, 0x9B],
];

async function sendInitSequence() {
  logRaw('svc', '=== Init ===');
  for (const cmd of INIT_COMMANDS) {
    await sendCommand(cmd);
    await new Promise(r => setTimeout(r, 100));
  }
  if (keepaliveInterval) clearInterval(keepaliveInterval);
  keepaliveInterval = setInterval(() => sendCommand([0xF0, 0xAC, 0x9C]), 300);
  logRaw('svc', 'Keepalive iniciado');
}

function parseDomyosRowerData(dv) {
  const bytes = new Uint8Array(dv.buffer);
  if (bytes.length < 20 || bytes[0] !== 0xF0) return null;

  const strokes = (bytes[2] << 8) | bytes[3];
  const pace = (bytes[6] << 8) | bytes[7];
  const cadence = bytes[9];
  const calories = (bytes[10] << 8) | bytes[11];
  const distRaw = (bytes[12] << 8) | bytes[13];
  const resistance = bytes[14];
  const heartRate = bytes[18];
  const inclination = bytes[21];

  let speed = 0;
  if (pace > 0 && pace < 0xFFFF) {
    speed = parseFloat(((60 / pace) * 30).toFixed(1));
  }

  const distance = distRaw * 100;

  // Actualizar estado del juego
  // La velocidad NO se asigna directamente: el modelo físico la calcula
  gameState.cadence = cadence;
  gameState.strokes = strokes;
  gameState.distance = distance;
  if (distance > gameState.gameDistance) gameState.gameDistance = distance;
  gameState.resistance = resistance;
  gameState.calories = calories;
  gameState.heartRate = heartRate;
  gameState.inclination = inclination;
  lastBLEPacketTime = clock.elapsedTime;

  // Detectar nueva remada vía stroke count → aplicar impulso inmediato
  if (strokes > gameState.lastBLEStrokes) {
    applyStrokeImpulse();
    gameState.lastBLEStrokes = strokes;
  }

  // Actualizar HUD (la velocidad la actualiza updateBoatPhysics)
  $sCadence.textContent = cadence + ' spm';
  $sStrokes.textContent = strokes;
  $sDist.textContent = distance + ' m';
  $sResist.textContent = resistance || '—';
  $sCal.textContent = calories + ' kcal';
  $sHR.textContent = heartRate > 0 ? heartRate + ' bpm' : '—';
  $sIncl.textContent = inclination || '—';

  return true;
}

function onDomyosNotify(e) {
  const dv = e.target.value;
  const bytes = new Uint8Array(dv.buffer);
  logRaw('hex', `<<< RX [${bytes.length}B]: ${toHex(dv.buffer)}`);
  if (bytes.length === 26 && bytes[0] === 0xF0) {
    try { parseDomyosRowerData(dv); } catch(err) {
      logRaw('hex', `(parse error: ${err.message})`);
    }
  }
}

async function exploreServer(server) {
  logRaw('svc', 'Buscando servicio Domyos...');
  try {
    const svc = await server.getPrimaryService(DOMYOS_SERVICE_UUID);
    logRaw('svc', 'Servicio Domyos encontrado');
    await setupDomyosService(svc);
  } catch(err) {
    logRaw('svc', `getPrimaryService falló: ${err.message}`);
  }
}

async function setupDomyosService(svc) {
  const chars = await svc.getCharacteristics();
  for (const ch of chars) {
    if (ch.uuid === DOMYOS_NOTIFY_UUID) {
      notifyChar = ch;
      ch.addEventListener('characteristicvaluechanged', onDomyosNotify);
      await ch.startNotifications();
      logRaw('svc', 'Suscrito a Notify');
    }
    if (ch.uuid === DOMYOS_WRITE_UUID) {
      writeChar = ch;
      logRaw('svc', 'Write characteristic lista');
    }
  }
  if (writeChar) await sendInitSequence();
}

// --- Botón conectar ---
$btn.addEventListener('click', async () => {
  try {
    $btn.disabled = true;
    setStatus('Solicitando Bluetooth...', false);
    device = await navigator.bluetooth.requestDevice({
      acceptAllDevices: true,
      optionalServices: [DOMYOS_SERVICE_UUID, DEVICE_INFO_SERVICE_UUID]
    });
    setStatus('Conectando...', false);
    device.addEventListener('gattserverdisconnected', () => {
      setStatus('Desconectado', false);
      $btn.disabled = false;
      gameState.cadence = 0;
      lastBLEPacketTime = 0;
      if (keepaliveInterval) { clearInterval(keepaliveInterval); keepaliveInterval = null; }
    });
    server = await device.gatt.connect();
    setStatus('Conectado', true);
    await exploreServer(server);
    setStatus('Remando', true);
  } catch (err) {
    setStatus('Error: ' + err.message, false);
    $btn.disabled = false;
  }
});
