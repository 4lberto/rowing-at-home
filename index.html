<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Remo Domyos 500B - Monitor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e; color: #eee; min-height: 100vh; padding: 20px;
    }
    h1 { text-align: center; margin-bottom: 20px; }
    #connect-btn {
      display: block; margin: 0 auto 20px; padding: 15px 40px; font-size: 18px;
      border: none; border-radius: 8px; background: #0f3460; color: #fff;
      cursor: pointer; transition: background .2s;
    }
    #connect-btn:hover { background: #1a4a8a; }
    #connect-btn:disabled { opacity: .5; cursor: default; }
    #rediscover-btn {
      display: block; margin: 0 auto 20px; padding: 10px 30px; font-size: 14px;
      border: none; border-radius: 8px; background: #2a2a4e; color: #ccc;
      cursor: pointer; transition: background .2s;
    }
    #rediscover-btn:hover { background: #3a3a6e; }
    #rediscover-btn:disabled { opacity: .5; cursor: default; }
    #status { text-align: center; margin-bottom: 20px; font-size: 16px; }
    .connected { color: #4ecca3; }
    .disconnected { color: #e94560; }
    .panels { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
    .panel {
      background: #16213e; border-radius: 10px; padding: 20px; flex: 1;
      min-width: 320px; max-width: 600px;
    }
    .panel h2 { margin-bottom: 15px; font-size: 16px; color: #4ecca3; }
    #data-list { list-style: none; }
    #data-list li {
      display: flex; justify-content: space-between;
      padding: 8px 0; border-bottom: 1px solid #1a1a3e; font-size: 14px;
    }
    #data-list li span:first-child { color: #aaa; }
    #data-list li span:last-child { font-weight: bold; font-size: 16px; }
    #data-list .big-value { font-size: 22px !important; color: #4ecca3; }
    #raw-log {
      font-family: "SF Mono", Monaco, Consolas, monospace; font-size: 12px;
      white-space: pre-wrap; word-break: break-all; max-height: 500px;
      overflow-y: auto; line-height: 1.6;
    }
    #raw-log .ts { color: #888; }
    #raw-log .hex { color: #4ecca3; }
    #raw-log .svc { color: #e94560; }
    #raw-log .chr { color: #f0a500; }
    #raw-log .cmd { color: #6ab0f3; }
  </style>
</head>
<body>
  <h1>Remo Domyos 500B - Monitor</h1>
  <button id="connect-btn">Conectar a la máquina</button>
  <button id="rediscover-btn" disabled>Rediscover servicios</button>
  <div id="status" class="disconnected">Desconectado</div>
  <div class="panels">
    <div class="panel">
      <h2>Datos de remo (protocolo ISSC Domyos)</h2>
      <ul id="data-list">
        <li><span>Estado</span><span>Sin conexión</span></li>
      </ul>
    </div>
    <div class="panel">
      <h2>Trama cruda y eventos</h2>
      <div id="raw-log"></div>
    </div>
  </div>

<script>
// --- UUIDs ---
const uuid = (n) => '0000' + n.toString(16).padStart(4,'0') + '-0000-1000-8000-00805f9b34fb';

// Protocolo propietario ISSC (Microchip/ISSC transparent UART)
const DOMYOS_SERVICE_UUID = '49535343-fe7d-4ae5-8fa9-9fafd205e455';
const DOMYOS_NOTIFY_UUID   = '49535343-1e4d-4bd9-ba61-23c647249616';
const DOMYOS_WRITE_UUID    = '49535343-8841-43f4-a8d4-ecbe34729bb3';

// Servicios estándar auxiliares
const DEVICE_INFO_SERVICE_UUID = uuid(0x180a);

const $btn     = document.getElementById('connect-btn');
const $redisc  = document.getElementById('rediscover-btn');
const $status  = document.getElementById('status');
const $data    = document.getElementById('data-list');
const $log     = document.getElementById('raw-log');

let device = null;
let server = null;
let writeChar = null;
let notifyChar = null;
let keepaliveInterval = null;

function setStatus(msg, ok) {
  $status.textContent = msg;
  $status.className = ok ? 'connected' : 'disconnected';
}
function logRaw(cls, text) {
  const line = document.createElement('div');
  const now = new Date().toLocaleTimeString('es-ES', { hour12: false });
  line.innerHTML = `<span class="ts">${now}</span> <span class="${cls}">${text}</span>`;
  $log.appendChild(line);
  $log.scrollTop = $log.scrollHeight;
}
function toHex(buf) {
  return [...new Uint8Array(buf)]
    .map(b => b.toString(16).padStart(2,'0')).join(' ');
}

// --- Checksum: suma de todos los bytes anteriores & 0xFF ---
function checksum(bytes) {
  return bytes.reduce((a, b) => a + b, 0) & 0xFF;
}

// --- Enviar comando al rower ---
async function sendCommand(bytes) {
  if (!writeChar) {
    logRaw('cmd', 'No hay write characteristic disponible');
    return;
  }
  const cmd = new Uint8Array(bytes);
  logRaw('cmd', `>>> TX: ${toHex(cmd.buffer)}`);
  try {
    await writeChar.writeValue(cmd);
  } catch(e) {
    logRaw('cmd', `Error escribiendo: ${e.message}`);
  }
}

// --- Secuencia de inicialización (ChangYow) ---
const INIT_COMMANDS = [
  [0xF0, 0xA3, 0x93],
  [0xF0, 0xA4, 0x94],
  [0xF0, 0xA5, 0x95],
  [0xF0, 0xAB, 0x9B],
];

async function sendInitSequence() {
  logRaw('cmd', '=== Enviando secuencia de init ===');
  for (const cmd of INIT_COMMANDS) {
    await sendCommand(cmd);
    await sleep(100);
  }
  logRaw('cmd', '=== Init completado ===');
  // Start keepalive
  if (keepaliveInterval) clearInterval(keepaliveInterval);
  keepaliveInterval = setInterval(() => {
    sendCommand([0xF0, 0xAC, 0x9C]);
  }, 300);
  logRaw('cmd', 'Keepalive iniciado (cada 300ms)');
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// --- Parser del paquete propietario Domyos (26 bytes, big-endian) ---
function parseDomyosRowerData(dv) {
  const bytes = new Uint8Array(dv.buffer);
  if (bytes.length < 20) return null;
  if (bytes[0] !== 0xF0) return null;

  const d = {};
  // Byte 1: command/response code
  d['Cmd'] = '0x' + bytes[1].toString(16).padStart(2,'0');

  // Bytes 2-3: Stroke count (uint16 BE)
  d['Remadas'] = (bytes[2] << 8) | bytes[3];

  // Bytes 6-7: Pace (sec/500m) → speed
  const pace = (bytes[6] << 8) | bytes[7];
  if (pace > 0 && pace < 0xFFFF) {
    d['Ritmo (s/500m)'] = pace;
    d['Velocidad (km/h)'] = ((60 / pace) * 30).toFixed(1);
  }

  // Byte 9: Cadence (strokes/min)
  d['Cadencia (spm)'] = bytes[9];

  // Bytes 10-11: Calories (uint16 BE)
  d['Calorías (kcal)'] = (bytes[10] << 8) | bytes[11];

  // Bytes 12-13: Distance (uint16 BE, /10 = km)
  const distRaw = (bytes[12] << 8) | bytes[13];
  d['Distancia (m)'] = (distRaw * 100).toFixed(0);

  // Byte 14: Resistance (1-15)
  d['Resistencia'] = bytes[14];

  // Byte 18: Heart rate
  const hr = bytes[18];
  d['Pulsaciones (bpm)'] = hr > 0 ? hr : '—';

  // Byte 21: Inclination (0-15)
  d['Inclinación'] = bytes[21];

  // Checksum (último byte)
  const expectedChecksum = checksum(bytes.slice(0, -1));
  d['Checksum'] = (expectedChecksum === bytes[bytes.length - 1]) ? 'OK' : 'FAIL';

  return d;
}

function renderData(d) {
  $data.innerHTML = '';
  const bigKeys = ['Remadas', 'Velocidad (km/h)', 'Cadencia (spm)'];
  for (const [k,v] of Object.entries(d)) {
    const li = document.createElement('li');
    const big = bigKeys.includes(k) ? 'big-value' : '';
    li.innerHTML = `<span>${k}</span><span class="${big}">${v}</span>`;
    $data.appendChild(li);
  }
  if (Object.keys(d).length === 0) {
    $data.innerHTML = '<li><span>Sin datos</span><span>—</span></li>';
  }
}

// --- Handler para notificaciones del rower ---
function onDomyosNotify(e) {
  const dv = e.target.value;
  const bytes = new Uint8Array(dv.buffer);
  logRaw('hex', `<<< RX [${bytes.length}B]: ${toHex(dv.buffer)}`);

  if (bytes.length === 26 && bytes[0] === 0xF0) {
    try {
      const parsed = parseDomyosRowerData(dv);
      if (parsed) renderData(parsed);
    } catch(err) {
      logRaw('hex', `(parse error: ${err.message})`);
    }
  }
}

// --- Explorar servicios ---
async function exploreServer(server) {
  // Intentar servicio propietario Domyos
  logRaw('svc', '>>> Buscando servicio Domyos ISSC...');
  try {
    const svc = await server.getPrimaryService(DOMYOS_SERVICE_UUID);
    logRaw('svc', `*** Servicio Domyos ISSC encontrado: ${svc.uuid} ***`);
    await setupDomyosService(svc);
  } catch(err) {
    logRaw('svc', `getPrimaryService(Domyos) falló: ${err.message}`);
  }

  // Descubrimiento completo
  const services = await server.getPrimaryServices();
  logRaw('svc', `=== Servicios encontrados: ${services.length} ===`);
  for (const svc of services) {
    if (svc.uuid === DOMYOS_SERVICE_UUID) continue;
    await exploreService(svc);
  }
}

async function setupDomyosService(svc) {
  const chars = await svc.getCharacteristics();
  for (const ch of chars) {
    logRaw('chr',
      `  Característica ${ch.uuid} | props: ${
        ['broadcastRead','read','writeWithoutResp','write','notify','indicate']
          .filter(p => ch.properties[p]).join(',')}`);

    if (ch.uuid === DOMYOS_NOTIFY_UUID) {
      notifyChar = ch;
      ch.addEventListener('characteristicvaluechanged', onDomyosNotify);
      await ch.startNotifications();
      logRaw('chr', '  *** SUSCRITO a Notify (datos de remo) ***');
    }
    if (ch.uuid === DOMYOS_WRITE_UUID) {
      writeChar = ch;
      logRaw('chr', '  *** Write characteristic lista ***');
    }

    // Suscribirse a cualquier otra con notify
    if ((ch.properties.notify || ch.properties.indicate) &&
        ch.uuid !== DOMYOS_NOTIFY_UUID) {
      ch.addEventListener('characteristicvaluechanged', (e) => {
        logRaw('hex', `Notify ${ch.uuid}: ${toHex(e.target.value.buffer)}`);
      });
      await ch.startNotifications();
      logRaw('chr', `  *** SUSCRITO a ${ch.uuid} ***`);
    }
  }

  // Si tenemos write characteristic, enviar secuencia de init
  if (writeChar) {
    await sendInitSequence();
  }
}

async function exploreService(svc) {
  logRaw('svc', `Servicio ${svc.uuid}`);
  let chars;
  try {
    chars = await svc.getCharacteristics();
  } catch(e) {
    logRaw('svc', `  (error leyendo características: ${e.message})`);
    return;
  }
  for (const ch of chars) {
    logRaw('chr',
      `  Característica ${ch.uuid} | props: ${
        ['broadcastRead','read','writeWithoutResp','write','notify','indicate']
          .filter(p => ch.properties[p]).join(',')}`);
    if (ch.properties.notify || ch.properties.indicate) {
      ch.addEventListener('characteristicvaluechanged', (e) => {
        logRaw('hex', `Notify ${ch.uuid}: ${toHex(e.target.value.buffer)}`);
      });
      await ch.startNotifications();
      logRaw('chr', `  *** SUSCRITO a notify ***`);
    }
    if (ch.properties.read) {
      try {
        const v = await ch.readValue();
        const text = new TextDecoder().decode(v);
        logRaw('hex', `    valor: ${toHex(v.buffer)} (${text.trim()})`);
      } catch(e) { /* ignore */ }
    }
  }
}

// --- Rediscover ---
$redisc.addEventListener('click', async () => {
  if (!server || !server.connected) {
    setStatus('No hay conexión activa', false);
    return;
  }
  $redisc.disabled = true;
  setStatus('Rediscovering servicios...', true);
  logRaw('svc', '\n--- REDISCOVER ---\n');
  try {
    if (server.connected) {
      server = await device.gatt.connect();
    }
    await exploreServer(server);
    setStatus('Rediscover completado ✓', true);
  } catch(err) {
    logRaw('svc', `Rediscover error: ${err.message}`);
    setStatus('Error rediscover: ' + err.message, false);
  }
  $redisc.disabled = false;
});

// --- Connect ---
$btn.addEventListener('click', async () => {
  try {
    $btn.disabled = true;
    setStatus('Solicitando dispositivo Bluetooth...', false);

    device = await navigator.bluetooth.requestDevice({
      acceptAllDevices: true,
      optionalServices: [DOMYOS_SERVICE_UUID, DEVICE_INFO_SERVICE_UUID]
    });
    setStatus('Conectando a ' + (device.name || device.id) + '...', false);
    device.addEventListener('gattserverdisconnected', () => {
      setStatus('Desconectado', false);
      $btn.disabled = false;
      $redisc.disabled = true;
      if (keepaliveInterval) {
        clearInterval(keepaliveInterval);
        keepaliveInterval = null;
      }
    });
    server = await device.gatt.connect();
    setStatus('Conectado ✓', true);
    setStatus('Descubriendo servicios...', true);
    await exploreServer(server);
    setStatus('Conectado y escuchando ✓', true);
    $redisc.disabled = false;
  } catch (err) {
    setStatus('Error: ' + err.message, false);
    $btn.disabled = false;
  }
});
</script>
</body>
</html>
